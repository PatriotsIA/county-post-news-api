AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: County Post News API on a low-cost Lambda Function URL.

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        CACHE_TTL_SECONDS: "30"
        REQUEST_TIMEOUT_MS: "3500"
        DEFAULT_LIMIT: "48"
        MAX_LIMIT: "200"
        COUNTY_FALLBACK_MIN_ITEMS: "12"
        ARTICLE_MAX_AGE_DAYS: "183"
        FRESHNESS_FOCUS_DAYS: "14"
        STATE_MARKET_LIMIT: "4"
        COUNTY_MARKET_LIMIT: "3"
        GDELT_ENABLED: "true"
        GDELT_MAX_RECORDS: "100"
        BING_NEWS_ENABLED: "true"
        UPSTREAM_CONCURRENCY: "12"
        MAX_RSS_URLS_PER_FEED: "18"
        MAX_ARTICLE_QUERIES_PER_FEED: "6"
        CORS_ORIGIN: "*"

Resources:
  NewsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: dist/src/handler.handler
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
          AllowHeaders:
            - content-type

Outputs:
  NewsApiUrl:
    Description: Public Lambda Function URL for the news API.
    Value: !GetAtt NewsApiFunctionUrl.FunctionUrl
