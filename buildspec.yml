version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
  pre_build:
    commands:
      - npm run typecheck
      - npm test
  build:
    commands:
      - npm run build
      - sam build
      - sam package --template-file .aws-sam/build/template.yaml --s3-bucket "$ARTIFACT_BUCKET" --output-template-file packaged.yaml

artifacts:
  files:
    - packaged.yaml
